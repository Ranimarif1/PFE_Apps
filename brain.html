<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Neural Brain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  #hud {
    position: absolute; inset: 0; pointer-events: none;
    font-family: 'Courier New', monospace; color: rgba(60,190,255,0.5); font-size: 9.5px;
  }
  .tag { position: absolute; white-space: nowrap; letter-spacing: .08em; }
  .tag::before { content: '▸ '; }
  #t1  { top: 17%; left: 6%; }
  #t2  { top: 10%; right: 7%; }
  #t3  { top: 36%; left: 4%; }
  #t4  { top: 56%; right: 6%; }
  #t5  { bottom: 22%; left: 6%; }
  #t6  { bottom: 14%; right: 7%; }
  #title { position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    color: rgba(80,210,255,0.4); font-size: 11px; letter-spacing: .35em; text-transform: uppercase; }
  #bar { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: rgba(60,180,255,0.3); font-size: 9px; letter-spacing: .18em; }
  #controls {
    position: absolute; bottom: 34px; right: 18px;
    color: rgba(60,180,255,0.4); font-size: 9px; letter-spacing: .1em; text-align: right;
  }
</style>
</head>
<body>
<div id="hud">
  <div id="title">CEREBRAL CORTEX — NEURAL SCAN ACTIVE</div>
  <div class="tag" id="t1">FRONTAL LOBE · ACTIVE</div>
  <div class="tag" id="t2">PARIETAL LOBE · 91%</div>
  <div class="tag" id="t3">TEMPORAL LOBE · LEFT</div>
  <div class="tag" id="t4">TEMPORAL LOBE · RIGHT</div>
  <div class="tag" id="t5">CEREBELLUM · MAPPED</div>
  <div class="tag" id="t6">OCCIPITAL LOBE · SCAN</div>
  <div id="bar">NODES: 512 &nbsp;·&nbsp; SYNAPSES: 2,140 &nbsp;·&nbsp; ROTATION: AUTO &nbsp;·&nbsp; STATUS: NOMINAL</div>
  <div id="controls">DRAG TO ROTATE<br>SCROLL TO ZOOM</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
/* ═══════════════════════════════════════════════
   SCENE
═══════════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020b12);
scene.fog = new THREE.FogExp2(0x010810, 0.12);

const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 0.25, 3.4);
camera.lookAt(0, 0, 0);

/* ═══════════════════════════════════════════════
   NOISE
═══════════════════════════════════════════════ */
function fade(t) { return t*t*t*(t*(t*6-15)+10); }
function lrp(t,a,b) { return a+t*(b-a); }
function h3(x,y,z) {
  let n = Math.sin(x*127.1+y*311.7+z*74.7)*43758.5453;
  return n - Math.floor(n);
}
function sn(x,y,z) {
  const ix=Math.floor(x),iy=Math.floor(y),iz=Math.floor(z);
  const fx=x-ix,fy=y-iy,fz=z-iz;
  const ux=fade(fx),uy=fade(fy),uz=fade(fz);
  return lrp(uz,
    lrp(uy,lrp(ux,h3(ix,iy,iz),h3(ix+1,iy,iz)),lrp(ux,h3(ix,iy+1,iz),h3(ix+1,iy+1,iz))),
    lrp(uy,lrp(ux,h3(ix,iy,iz+1),h3(ix+1,iy,iz+1)),lrp(ux,h3(ix,iy+1,iz+1),h3(ix+1,iy+1,iz+1)))
  )*2-1;
}
function fbm(x,y,z,oct=4) {
  let v=0,a=0.5,f=1;
  for(let i=0;i<oct;i++){v+=a*sn(x*f,y*f,z*f);a*=.5;f*=2.07;}
  return v;
}

/* ═══════════════════════════════════════════════
   BRAIN GEOMETRY
   Coordinate system: Y=up, Z=front, X=right
═══════════════════════════════════════════════ */
function brainDisplace(nx, ny, nz) {
  /* ── Overall shape ── */
  // Brain is elongated front-to-back, wider than tall
  let sx = 1.15, sy = 0.82, sz = 1.10;

  // Frontal lobe: rounds outward at front-top
  if (nz > 0.2 && ny > -0.3) {
    const f = nz * Math.max(0, ny + 0.5) * 0.18;
    sy += f; sx += f * 0.3;
  }

  // Temporal lobe: the defining feature — extends downward on each side
  // Located at sides (|nx| high), below equator (ny < 0), mid front-back
  const tMask = Math.exp(-((ny + 0.55)**2) / 0.14) *
                Math.exp(-((Math.abs(nx) - 0.60)**2) / 0.07) *
                Math.max(0, 1 - (Math.abs(nz) - 0.1) / 0.7);
  const temporal = tMask * 0.28;  // significant outward/downward bulge

  // Occipital: slightly narrower and lower at back
  if (nz < -0.5) {
    const oFactor = (-nz - 0.5) / 0.5;
    sx -= oFactor * 0.08;
    sy -= oFactor * 0.05;
  }

  /* ── Grooves ── */
  // Inter-hemispheric fissure — deep midline groove from front to back, top half
  const fissure = Math.exp(-nx * nx * 90) * Math.pow(Math.max(0, ny * 0.9 + 0.15), 0.6) * 0.16;

  // Sylvian (lateral) fissure — major horizontal groove on each side
  const syl = Math.exp(-((ny + 0.08)**2) / 0.016) *
              Math.exp(-((Math.abs(nx) - 0.52)**2) / 0.045) * 0.085;

  // Central sulcus — curved groove separating frontal & parietal
  // Runs roughly from mid-top toward sides, angled
  const csAngle = Math.atan2(Math.sqrt(nx*nx+nz*nz)*0.6, ny);
  const central = Math.exp(-((csAngle - 1.05)**2) / 0.035) *
                  Math.max(0, ny) * Math.max(0, 1 - Math.abs(nz)*1.5) * 0.055;

  /* ── Gyri / sulci surface detail ── */
  // Coarse folds (main gyri)
  const g1 = Math.sin(ny * 8.2 + nz * 2.5 + 0.4) * 0.036;
  const g2 = Math.sin(nz * 9.8 - nx * 3.8 + 1.3) * 0.028;
  const g3 = Math.sin(nx * 7.6 + ny * 5.2 + 2.0) * 0.022;
  const g4 = Math.sin(ny * 13  - nz * 5   + 0.9) * 0.016;
  // FBM for irregular organic pattern
  const coarse = fbm(nx*2.4, ny*2.4+0.6, nz*2.4, 4) * 0.058;
  const fine   = fbm(nx*5.2, ny*5.2+1.1, nz*5.2, 3) * 0.024;

  const disp = g1+g2+g3+g4 + coarse + fine - fissure - syl - central;
  const r = 1 + disp;

  return [
    nx * r * sx + nx * temporal,
    ny * r * sy - 0.07 - tMask * 0.12,  // temporal pulls points down
    nz * r * sz
  ];
}

function makeBrainGeo(res=96) {
  const geo = new THREE.SphereGeometry(1, res, Math.round(res*0.75));
  const p = geo.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const x=p.getX(i), y=p.getY(i), z=p.getZ(i);
    const L=Math.sqrt(x*x+y*y+z*z)||1;
    const [bx,by,bz] = brainDisplace(x/L,y/L,z/L);
    p.setXYZ(i, bx, by, bz);
  }
  geo.computeVertexNormals();
  return geo;
}

/* ── Cerebellum ── */
function makeCerebGeo(res=56) {
  const geo = new THREE.SphereGeometry(1, res, Math.round(res*0.65));
  const p = geo.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const x=p.getX(i), y=p.getY(i), z=p.getZ(i);
    const L=Math.sqrt(x*x+y*y+z*z)||1;
    const nx=x/L, ny=y/L, nz=z/L;

    // Folia: fine horizontal ridges characteristic of cerebellum
    const folia  = Math.sin(ny * 28) * 0.055;
    const folia2 = Math.sin(ny * 56) * 0.022;
    const noise  = fbm(nx*3, ny*3, nz*3, 3) * 0.04;

    // Flatten top, wider L-R
    const scaleX = 1.35, scaleY = ny > 0 ? 0.52 : 0.82, scaleZ = 0.78;
    const r = 1 + folia + folia2 + noise;
    p.setXYZ(i, nx*r*scaleX, ny*r*scaleY, nz*r*scaleZ);
  }
  geo.computeVertexNormals();
  return geo;
}

/* ── Brainstem ── */
function makeStemGeo() {
  const path = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0,  0,   -0.55),
    new THREE.Vector3(0, -0.3, -0.62),
    new THREE.Vector3(0, -0.6, -0.58),
    new THREE.Vector3(0, -0.9, -0.5),
    new THREE.Vector3(0, -1.1, -0.42),
  ]);
  return new THREE.TubeGeometry(path, 24, 0.095, 10, false);
}

console.log('Building brain geometry…');
const brainGeo = makeBrainGeo(96);
const cerebGeo = makeCerebGeo(52);
const stemGeo  = makeStemGeo();
console.log('Done.');

/* ═══════════════════════════════════════════════
   MATERIALS & MESHES
═══════════════════════════════════════════════ */
const darkMat = new THREE.MeshPhongMaterial({
  color: 0x001825, emissive: 0x000c18, specular: 0x003050,
  shininess: 80, transparent: true, opacity: 0.78
});

const wireMat = new THREE.MeshBasicMaterial({
  color: 0x0088cc, wireframe: true, transparent: true, opacity: 0.11,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const cerebWireMat = wireMat.clone();
cerebWireMat.opacity = 0.14;
cerebWireMat.color.set(0x006699);

const stemMat = new THREE.MeshPhongMaterial({
  color: 0x001520, emissive: 0x000b14, specular: 0x002240,
  shininess: 50, transparent: true, opacity: 0.75
});
const stemWireMat = new THREE.MeshBasicMaterial({
  color: 0x006688, wireframe: true, transparent: true, opacity: 0.1,
  blending: THREE.AdditiveBlending, depthWrite: false
});

const brainGroup = new THREE.Group();

// Cerebral hemispheres
brainGroup.add(new THREE.Mesh(brainGeo, darkMat));
brainGroup.add(new THREE.Mesh(brainGeo.clone(), wireMat));

// Cerebellum — positioned at rear-bottom
const cerebGroup = new THREE.Group();
cerebGroup.add(new THREE.Mesh(cerebGeo, darkMat.clone()));
cerebGroup.add(new THREE.Mesh(cerebGeo.clone(), cerebWireMat));
cerebGroup.position.set(0, -0.85, -0.80);
cerebGroup.scale.setScalar(0.44);
brainGroup.add(cerebGroup);

// Brainstem
brainGroup.add(new THREE.Mesh(stemGeo, stemMat));
brainGroup.add(new THREE.Mesh(stemGeo.clone(), stemWireMat));

scene.add(brainGroup);

/* ═══════════════════════════════════════════════
   NEURAL COLOR
═══════════════════════════════════════════════ */
function neuralColor(x, y, z) {
  const t   = (y + 1) * 0.5;                     // 0=bottom, 1=top
  const rad = Math.sqrt(x*x + z*z);              // 0=center, ~1=edge
  const edge = Math.min(rad / 1.1, 1);
  const front = Math.max(0, z) / 1.1;            // z>0 = frontal/warmer
  const back  = Math.max(0, -z) / 1.1;

  // Base: deep blue bottom → cyan mid → pale blue top
  let r = 0.04 + t * 0.42;
  let g = 0.28 + t * 0.52;
  let b = 0.90 + t * 0.10;

  // Sides get a purple-pink tinge
  r += edge * 0.55;
  b += edge * 0.15;
  g -= edge * 0.12;

  // Front hemisphere: warm yellow-white highlights
  r += front * 0.55;
  g += front * 0.40;
  b -= front * 0.20;

  // Back hemisphere: cooler purple
  r += back * 0.35;
  b += back * 0.25;
  g -= back * 0.08;

  return [Math.min(r,1), Math.min(g,1), Math.min(b,1)];
}

/* ═══════════════════════════════════════════════
   NODE PLACEMENT — surface + volume
═══════════════════════════════════════════════ */
function sampleBrainSurface() {
  const phi   = Math.acos(2*Math.random()-1);
  const theta = Math.random()*Math.PI*2;
  const nx=Math.sin(phi)*Math.cos(theta);
  const ny=Math.sin(phi)*Math.sin(theta);
  const nz=Math.cos(phi);
  const [bx,by,bz] = brainDisplace(nx,ny,nz);
  const fuzz = 0.96 + Math.random()*0.08;
  return new THREE.Vector3(bx*fuzz, by*fuzz, bz*fuzz);
}

const NODES = 512;
const nodes = Array.from({length: NODES}, sampleBrainSurface);

/* node point cloud */
{
  const posArr = new Float32Array(NODES*3);
  const colArr = new Float32Array(NODES*3);
  nodes.forEach((p,i) => {
    posArr[i*3]=p.x; posArr[i*3+1]=p.y; posArr[i*3+2]=p.z;
    const [r,g,b]=neuralColor(p.x,p.y,p.z);
    colArr[i*3]=r; colArr[i*3+1]=g; colArr[i*3+2]=b;
  });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(posArr,3));
  geo.setAttribute('color',   new THREE.BufferAttribute(colArr,3));
  const mat = new THREE.PointsMaterial({
    size:0.013, vertexColors:true, transparent:true, opacity:0.95,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  scene.add(new THREE.Points(geo, mat));
}

/* ═══════════════════════════════════════════════
   NEURAL CONNECTIONS
═══════════════════════════════════════════════ */
const SHORT = 0.36, MEDIUM = 0.55, LONG = 0.75;
const ePosShort=[], eColShort=[];
const ePosLong=[], eColLong=[];

for (let i=0; i<NODES; i++) {
  for (let j=i+1; j<NODES; j++) {
    const d = nodes[i].distanceTo(nodes[j]);
    const longChance = d < LONG && d > MEDIUM && Math.random() < 0.012;

    if (d < SHORT || (d < MEDIUM && Math.random() < 0.35) || longChance) {
      const arr = d > MEDIUM ? ePosLong : ePosShort;
      const col = d > MEDIUM ? eColLong : eColShort;
      const [r1,g1,b1]=neuralColor(nodes[i].x,nodes[i].y,nodes[i].z);
      const [r2,g2,b2]=neuralColor(nodes[j].x,nodes[j].y,nodes[j].z);
      arr.push(nodes[i].x,nodes[i].y,nodes[i].z, nodes[j].x,nodes[j].y,nodes[j].z);
      col.push(r1,g1,b1, r2,g2,b2);
    }
  }
}

function makeLines(posArr, colArr, opacity) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(posArr),3));
  geo.setAttribute('color',   new THREE.BufferAttribute(new Float32Array(colArr),3));
  const mat = new THREE.LineBasicMaterial({
    vertexColors:true, transparent:true, opacity,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  return { lines: new THREE.LineSegments(geo,mat), mat };
}

const { lines: shortLines, mat: shortMat } = makeLines(ePosShort, eColShort, 0.55);
const { lines: longLines,  mat: longMat  } = makeLines(ePosLong,  eColLong,  0.35);
scene.add(shortLines, longLines);

/* Bright highlight pass — dense local connections */
const bPos=[], bCol=[];
for (let i=0; i<NODES; i+=3) {
  for (let j=i+1; j<NODES; j+=3) {
    if (nodes[i].distanceTo(nodes[j]) < 0.20) {
      const [r1,g1,b1]=neuralColor(nodes[i].x,nodes[i].y,nodes[i].z);
      const [r2,g2,b2]=neuralColor(nodes[j].x,nodes[j].y,nodes[j].z);
      bPos.push(nodes[i].x,nodes[i].y,nodes[i].z, nodes[j].x,nodes[j].y,nodes[j].z);
      bCol.push(Math.min(r1+.4,1),Math.min(g1+.35,1),Math.min(b1+.3,1),
                Math.min(r2+.4,1),Math.min(g2+.35,1),Math.min(b2+.3,1));
    }
  }
}
const { lines: brightLines, mat: brightMat } = makeLines(bPos, bCol, 0.25);
scene.add(brightLines);

/* ═══════════════════════════════════════════════
   GLOW SHELLS
═══════════════════════════════════════════════ */
function glowShell(r, color, opacity) {
  const m = new THREE.MeshBasicMaterial({
    color, transparent:true, opacity,
    side:THREE.BackSide, blending:THREE.AdditiveBlending, depthWrite:false
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(r,32,24), m));
  return m;
}
const gm1 = glowShell(1.22, 0x002244, 0.06);
const gm2 = glowShell(1.45, 0x001133, 0.03);

/* ═══════════════════════════════════════════════
   BACKGROUND GRID
═══════════════════════════════════════════════ */
{
  const grid = new THREE.GridHelper(30,60,0x001e33,0x000e1a);
  grid.material.transparent=true; grid.material.opacity=0.28;
  grid.position.y=-2.0;
  scene.add(grid);
  const gridV = new THREE.GridHelper(30,60,0x001e33,0x000e1a);
  gridV.material.transparent=true; gridV.material.opacity=0.07;
  gridV.position.z=-4.5; gridV.rotation.x=Math.PI/2;
  scene.add(gridV);
}

/* ═══════════════════════════════════════════════
   LIGHTING
═══════════════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0x001a30, 1.1));
const pl1 = new THREE.PointLight(0x0099ff, 3.5, 8);
const pl2 = new THREE.PointLight(0xff44bb, 2.2, 8);
const pl3 = new THREE.PointLight(0x00ffcc, 1.8, 6);
scene.add(pl1, pl2, pl3);

/* ═══════════════════════════════════════════════
   ORBIT CONTROLS (manual, no lib needed)
═══════════════════════════════════════════════ */
let autoRotate = true;
let isDragging = false, lastX = 0, lastY = 0;
let rotX = 0.12, rotY = 0, velX = 0, velY = 0.004;
let targetZoom = 3.4;

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY; autoRotate = false;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  velY = dx * 0.006; velX = dy * 0.004;
  rotY += velY; rotX += velX;
  rotX = Math.max(-1.1, Math.min(1.1, rotX));
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  setTimeout(() => { autoRotate = true; }, 2500);
});
window.addEventListener('wheel', e => {
  targetZoom = Math.max(1.8, Math.min(6, targetZoom + e.deltaY * 0.003));
});

/* Touch support */
let lastTouchX=0, lastTouchY=0;
renderer.domElement.addEventListener('touchstart', e=>{
  isDragging=true; lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY; autoRotate=false;
},{passive:true});
window.addEventListener('touchmove', e=>{
  if(!isDragging) return;
  const dx=e.touches[0].clientX-lastTouchX, dy=e.touches[0].clientY-lastTouchY;
  rotY+=dx*0.006; rotX+=dy*0.004;
  rotX=Math.max(-1.1,Math.min(1.1,rotX));
  lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
},{passive:true});
window.addEventListener('touchend',()=>{ isDragging=false; setTimeout(()=>{ autoRotate=true; },2500); });

/* ═══════════════════════════════════════════════
   ANIMATE
═══════════════════════════════════════════════ */
let clock = 0;
const neuralObjs = [shortLines, longLines, brightLines];

function applyRotation(obj) {
  obj.rotation.x = rotX;
  obj.rotation.y = rotY;
}

function animate() {
  requestAnimationFrame(animate);
  clock += 0.007;

  if (autoRotate) {
    velY += (0.004 - velY) * 0.02;
    rotY += velY;
  } else {
    velX *= 0.92; velY *= 0.92;
    rotX += velX; rotY += velY;
  }

  // Apply rotation to brain and all neural geometry
  applyRotation(brainGroup);
  neuralObjs.forEach(applyRotation);

  // Camera zoom
  camera.position.z += (targetZoom - camera.position.z) * 0.08;

  // Pulse opacities
  shortMat.opacity  = 0.48 + Math.sin(clock * 1.1)  * 0.13;
  longMat.opacity   = 0.30 + Math.sin(clock * 0.7 + 1) * 0.10;
  brightMat.opacity = 0.20 + Math.sin(clock * 1.6 + 2) * 0.08;
  gm1.opacity = 0.055 + Math.sin(clock * 0.6) * 0.02;
  gm2.opacity = 0.028 + Math.sin(clock * 0.4 + 1) * 0.01;

  // Orbiting lights
  pl1.position.set(
    Math.sin(clock * 0.38) * 2.8,
    Math.cos(clock * 0.27) * 1.8 + 0.8,
    Math.cos(clock * 0.38) * 2.8
  );
  pl2.position.set(
    Math.cos(clock * 0.31 + 2) * 2.4,
    Math.sin(clock * 0.22) * 1.6 - 0.4,
    Math.sin(clock * 0.31 + 2) * 2.4
  );
  pl3.position.set(
    Math.sin(clock * 0.44 + 4) * 2.2,
    1.4,
    Math.cos(clock * 0.44 + 4) * 2.2
  );

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
