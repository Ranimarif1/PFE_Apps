# Radiology Platform — Nginx configuration
# SERVER_IP is replaced by setup.sh

# ── Desktop app (port 443) ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name SERVER_IP;

    ssl_certificate     /etc/ssl/radiology/cert.pem;
    ssl_certificate_key /etc/ssl/radiology/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/radiology/desktop;
    index index.html;

    client_max_body_size 100M;

    # Node — session creation endpoint
    location = /api/session {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Node — Socket.io (WebSocket + long-polling)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # Django — all API endpoints
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # Django — user avatars / media files
    location /media/ {
        alias /opt/radiology/api-server/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Serve cert for device trust installation (iPhone/Android)
    location = /cert.pem {
        alias /etc/ssl/radiology/cert.pem;
        default_type application/x-x509-ca-cert;
    }

    # React SPA — catch-all for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Static assets — aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Mobile recording app (port 5173) ─────────────────────────────────────────
server {
    listen 5173 ssl;
    listen [::]:5173 ssl;
    server_name SERVER_IP;

    ssl_certificate     /etc/ssl/radiology/cert.pem;
    ssl_certificate_key /etc/ssl/radiology/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/radiology/mobile;
    index index.html;

    # Node — Socket.io (mobile connects to its own origin, nginx proxies here)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # React SPA — catch-all
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name SERVER_IP;
    return 301 https://$host$request_uri;
}
